---
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'true'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__X_FRAME_ENABLED: ${AIRFLOW__WEBSERVER__X_FRAME_ENABLED}
    AIRFLOW__WEBSERVER__WARN_DEPLOYMENT_EXPOSURE: ${AIRFLOW__WEBSERVER__WARN_DEPLOYMENT_EXPOSURE}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW_CONN_MONGO_DEFAULT: ${AIRFLOW_CONN_MONGO_DEFAULT}
    AIRFLOW_VAR_APPLICATION_ENV: ${AIRFLOW_VAR_APPLICATION_ENV}
    AIRFLOW_VAR_DPC_DAG_ID: ${AIRFLOW_VAR_DPC_DAG_ID}
    AIRFLOW_VAR_DPC_SCHEDULE_INTERVAL: ${AIRFLOW_VAR_DPC_SCHEDULE_INTERVAL}
    AIRFLOW_VAR_NATIONAL_DATA_COLLECTION: ${AIRFLOW_VAR_NATIONAL_DATA_COLLECTION}
    AIRFLOW_VAR_NATIONAL_TRENDS_COLLECTION: ${AIRFLOW_VAR_NATIONAL_TRENDS_COLLECTION}
    AIRFLOW_VAR_NATIONAL_SERIES_COLLECTION: ${AIRFLOW_VAR_NATIONAL_SERIES_COLLECTION}
    AIRFLOW_VAR_REGIONAL_DATA_COLLECTION: ${AIRFLOW_VAR_REGIONAL_DATA_COLLECTION}
    AIRFLOW_VAR_REGIONAL_TRENDS_COLLECTION: ${AIRFLOW_VAR_REGIONAL_TRENDS_COLLECTION}
    AIRFLOW_VAR_REGIONAL_SERIES_COLLECTION: ${AIRFLOW_VAR_REGIONAL_SERIES_COLLECTION}
    AIRFLOW_VAR_REGIONAL_BREAKDOWN_COLLECTION: ${AIRFLOW_VAR_REGIONAL_BREAKDOWN_COLLECTION}
    AIRFLOW_VAR_PROVINCIAL_DATA_COLLECTION: ${AIRFLOW_VAR_PROVINCIAL_DATA_COLLECTION}
    AIRFLOW_VAR_PROVINCIAL_BREAKDOWN_COLLECTION: ${AIRFLOW_VAR_PROVINCIAL_BREAKDOWN_COLLECTION}
    AIRFLOW_VAR_PROVINCIAL_TRENDS_COLLECTION: ${AIRFLOW_VAR_PROVINCIAL_TRENDS_COLLECTION}
    AIRFLOW_VAR_PROVINCIAL_SERIES_COLLECTION: ${AIRFLOW_VAR_PROVINCIAL_SERIES_COLLECTION}
    AIRFLOW_VAR_OD_DAG_ID: ${AIRFLOW_VAR_OD_DAG_ID}
    AIRFLOW_VAR_OD_SCHEDULE_INTERVAL: ${AIRFLOW_VAR_OD_SCHEDULE_INTERVAL}
    AIRFLOW_VAR_VAX_ADMINS_COLLECTION: ${AIRFLOW_VAR_VAX_ADMINS_COLLECTION}
    AIRFLOW_VAR_VAX_ADMINS_SUMMARY_COLLECTION: ${AIRFLOW_VAR_VAX_ADMINS_SUMMARY_COLLECTION}
    AIRFLOW_VAR_POP_COLLECTION: ${AIRFLOW_VAR_POP_COLLECTION}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    mongo:
      condition: service_healthy
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-db-volume:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: always

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:latest
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow

volumes:
  postgres-db-volume:
  mongo-db-volume:
